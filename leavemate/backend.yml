name: Build & Dockerize Backend

on:
  push:
    branches: ["main"]
    paths:
      - 'leavemate/**'

jobs:
  build-and-docker:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./leavemate

    steps:
      # ✅ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # ✅ Permission for mvnw
      - name: Grant permission
        run: chmod +x mvnw

      # ✅ Build JAR
      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      # ✅ Verify JAR
      - name: Check target folder
        run: ls -l target

      # ✅ Build Docker Image
      - name: Build Docker Image
        run: docker build -t leavemate-backend .

      # ✅ Show Docker images
      - name: List Docker Images
        run: docker images